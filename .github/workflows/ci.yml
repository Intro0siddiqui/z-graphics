name: Z-Graphics CI
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libvulkan-dev vulkan-tools pkg-config glslang-tools
      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install glslang
      - name: Install Windows Dependencies
        if: runner.os == 'Windows'
        run: choco install glslang
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build Library
        run: zig build
