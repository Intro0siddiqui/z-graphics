name: Z-Graphics CI
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config glslang-tools libvulkan-dev
      - name: Install macOS Dependencies
        if: runner.os == 'macOS'
        run: brew install glslang
      - name: Install Windows Dependencies
        if: runner.os == 'Windows'
        run: |
          choco install vulkan-sdk -y
          $vulkan_path = (Get-ChildItem -Path "C:\VulkanSDK" | Sort-Object Name -Descending | Select-Object -First 1).FullName
          $vulkan_bin = Join-Path $vulkan_path "Bin"
          echo "VULKAN_SDK=$vulkan_path" | Out-File -FilePath $env:GITHUB_ENV -Append
          echo "PATH=$vulkan_bin;$env:PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
        shell: pwsh
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Build Library
        run: zig build
